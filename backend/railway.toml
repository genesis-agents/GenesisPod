[build]
builder = "dockerfile"
useMetal = false

[deploy]
# 设置 NODE_ENV=production 以启用生产模式日志（仅 error/warn）
startCommand = "sh -c 'set -e; export NODE_ENV=production; export PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium; npm run diagnose || true; npm run deploy || exit 1; exec npm run start:prod'"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

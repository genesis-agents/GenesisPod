[build]
builder = "dockerfile"
useMetal = false

[deploy]
# 设置 NODE_ENV=production 以启用生产模式日志（仅 error/warn）
#
# Harness 灰度启动（2026-04-23）：
# - TOPIC_INSIGHTS_USE_HARNESS=1            主开关：允许 harness 路径接管
# - TOPIC_INSIGHTS_HARNESS_ROLLOUT_PCT=10   分流：10% 用户进入 harness（userId 哈希）
# - HARNESS_AGENTS_STUB=0                   agent 走真 LLM（不走 stub 占位）
# 熄火：单独 unset TOPIC_INSIGHTS_USE_HARNESS 或 SET=0 即全量回 legacy。
# 监控：GET /harness/health  +  GET /harness/health/history?hours=24
startCommand = "sh -c 'set -e; export NODE_ENV=production; export NODE_OPTIONS=\"--max-old-space-size=1536\"; export PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium; export TOPIC_INSIGHTS_USE_HARNESS=1; export TOPIC_INSIGHTS_HARNESS_ROLLOUT_PCT=10; export HARNESS_AGENTS_STUB=0; npm run diagnose || true; npm run deploy || exit 1; exec node dist/main'"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# LiteLLM Proxy Config - Gemini 3 Pro
# Reference: https://docs.litellm.ai/blog/gemini_3

model_list:
  # Claude Code model mappings -> Gemini 3 Pro (thinking_level: low)
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY
      reasoning_effort: low
      max_tokens: 16384

  - model_name: claude-opus-4-5-20251101
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY
      reasoning_effort: low
      max_tokens: 16384

  - model_name: claude-sonnet-4-5-20250929
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY
      reasoning_effort: low
      max_tokens: 16384

  # Claude Haiku -> Gemini Flash (faster, cheaper)
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY
      max_tokens: 8192

  # Direct Gemini Models
  - model_name: gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY
      reasoning_effort: low
      max_tokens: 16384

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY
      max_tokens: 8192

  # OpenAI Models
  - model_name: gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

# Router settings for reliability
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 300
  retry_policy:
    AuthenticationErrorRetries: 0
    TimeoutErrorRetries: 3
    RateLimitErrorRetries: 3
    ContentPolicyViolationErrorRetries: 2
    InternalServerErrorRetries: 3
  allowed_fails: 3
  cooldown_time: 60
  enable_fallbacks: false

litellm_settings:
  # Drop unsupported params instead of error
  drop_params: true
  # Reduce log noise
  set_verbose: false
  # Request settings
  request_timeout: 300
  stream_timeout: 300
  # Disable context caching to avoid "too small" errors
  disable_caching: true
  # Success callbacks (optional logging)
  success_callback: []
  failure_callback: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Disable internal logging to reduce overhead
  disable_spend_logs: true
  disable_reset_budget: true
  # Allow all IPs (for local use)
  allowed_ips: null

# Throughput & Resource Monitoring Scenarios
# Covers: PERF-TP-001~004, PERF-RS-001~006, PERF-BD-004~006
# from comprehensive-test-plan-2026-02-06.md

# ============================================================
# Throughput Tests (PERF-TP)
# ============================================================

# Ask API throughput
- id: perf-tp-ask
  test_plan_ids: [PERF-TP-001]
  description: "Ask API throughput: >20 req/min sustained 1 minute"
  method: api
  endpoint: "/api/ai-ask/conversations"
  duration: 60
  target_rps: 0.33
  expected: "All requests return 200, throughput >20/min"
  severity: P1

# Research API throughput
- id: perf-tp-research
  test_plan_ids: [PERF-TP-002]
  description: "Research API throughput: >5 tasks/min sustained 1 minute"
  method: api
  endpoint: "/api/ai-research/topics"
  duration: 60
  target_rps: 0.08
  expected: "All requests succeed, throughput >5/min"
  severity: P1

# Knowledge base search throughput
- id: perf-tp-rag-search
  test_plan_ids: [PERF-TP-003]
  description: "RAG search throughput: >30 queries/min sustained 1 minute"
  method: api
  endpoint: "/api/rag/search"
  duration: 60
  target_rps: 0.5
  expected: "All queries return results, throughput >30/min"
  severity: P1

# File upload throughput
- id: perf-tp-upload
  test_plan_ids: [PERF-TP-004]
  description: "File upload queue: 10 files processed successfully"
  method: api
  endpoint: "/api/resources/upload"
  queue_size: 10
  expected: "All 10 files uploaded and processed"
  severity: P2

# ============================================================
# Resource Monitoring (PERF-RS)
# ============================================================

# Idle memory
- id: perf-rs-idle-memory
  test_plan_ids: [PERF-RS-001]
  description: "Backend idle memory <512MB"
  method: monitoring
  metric: memory_rss
  condition: idle
  threshold_mb: 512
  expected: "Memory RSS < 512MB at idle"
  severity: P1

# Peak memory
- id: perf-rs-peak-memory
  test_plan_ids: [PERF-RS-002]
  description: "Backend peak memory <1GB under load"
  method: monitoring
  metric: memory_rss
  condition: "10 concurrent requests"
  threshold_mb: 1024
  expected: "Memory RSS < 1GB under load"
  severity: P1

# Memory leak
- id: perf-rs-memory-leak
  test_plan_ids: [PERF-RS-003]
  description: "No memory leak over extended runtime"
  method: monitoring
  metric: memory_growth
  duration: "1 hour"
  threshold_pct: 10
  expected: "Memory growth < 10% over 1 hour"
  severity: P1

# CPU utilization
- id: perf-rs-cpu
  test_plan_ids: [PERF-RS-004]
  description: "CPU utilization <80% under peak load"
  method: monitoring
  metric: cpu_usage
  condition: "peak load"
  threshold_pct: 80
  expected: "CPU < 80% during peak requests"
  severity: P1

# DB connection pool
- id: perf-rs-db-pool
  test_plan_ids: [PERF-RS-005]
  description: "Database connection pool not exhausted under 50 requests"
  method: monitoring
  metric: db_connections
  concurrent: 50
  expected: "Connections reused, pool not exhausted"
  severity: P1

# WebSocket memory
- id: perf-rs-ws-memory
  test_plan_ids: [PERF-RS-006]
  description: "WebSocket connection memory <5MB each"
  method: monitoring
  metric: ws_memory_per_connection
  threshold_mb: 5
  expected: "Each WS connection < 5MB memory"
  severity: P2


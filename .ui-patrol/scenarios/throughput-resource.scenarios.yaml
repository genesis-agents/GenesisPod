  data_volume: "50+ topics"
  expected: "List loads in <3s"
  severity: P2

# Writing chapters volume
- id: perf-bd-writing-chapters
  test_plan_ids: [PERF-BD-005]
  description: "50+ chapters navigation normal"
  method: browser
  data_volume: "50+ chapters"
  expected: "Navigation smooth, no crash"
  severity: P2

# Teams agent count
- id: perf-bd-teams-agents
  test_plan_ids: [PERF-BD-006]
  description: "10+ agents in a single team discussion"
  method: api
  data_volume: "10+ agents"
  expected: "Discussion proceeds normally"
  severity: P2

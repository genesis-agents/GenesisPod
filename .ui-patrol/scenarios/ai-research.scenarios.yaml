- id: topic-list-shows-seeded-data
  route: /ai-research
  auth: demo
  assertions:
    - selector: "[data-testid='topic-card'], .topic-card, [class*='TopicCard'], [class*='topic-card']"
      exists: true
    - text_contains: "[TEST]"

- id: topic-detail-renders
  route: /ai-research/topic/a0000001-0000-4000-8000-000000000001
  auth: demo
  assertions:
    - selector: "h1, [data-testid='topic-title']"
      exists: true
    - text_not_contains: "[object Object]"
    - text_not_contains: "undefined"

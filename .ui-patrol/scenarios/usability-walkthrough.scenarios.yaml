# Usability Walkthrough Scenarios
# Covers: DFX-U-001~008 from comprehensive-test-plan-2026-02-06.md

# First-use guidance
- id: dfx-u-first-use
  test_plan_ids: [DFX-U-001]
  description: "New user completes first Ask within 3 minutes"
  method: browser
  route: /ai-ask
  auth: demo
  expected: "Clear input area, obvious send button, response within 30s"
  severity: P1

# Navigation clarity
- id: dfx-u-nav-depth
  test_plan_ids: [DFX-U-002]
  description: "Any feature reachable in ≤2 clicks from main nav"
  method: browser
  pages:
    - /ai-ask
    - /ai-research
    - /ai-teams
    - /ai-writing
    - /ai-image
    - /ai-office
    - /library
    - /explore
  expected: "All pages accessible from sidebar, max 2 clicks"
  severity: P1

# Loading/Success/Error states
- id: dfx-u-feedback-states
  test_plan_ids: [DFX-U-003]
  description: "All async operations show loading → success → error states"
  method: browser
  route: /ai-ask
  auth: demo
  checks:
    - "Send message → spinner/loading visible during response"
    - "Successful response → content displayed"
    - "Error → friendly message shown, not raw stack trace"
  expected: "Three-state feedback clearly visible"
  severity: P0

# Error recovery
- id: dfx-u-error-recovery
  test_plan_ids: [DFX-U-004]
  description: "Error states provide retry/return action"
  method: browser
  auth: demo
  checks:
    - "API error → retry button visible"
    - "Page error → back/home navigation available"
  expected: "User can recover from errors without manual refresh"
  severity: P0

# Keyboard shortcuts
- id: dfx-u-shortcuts
  test_plan_ids: [DFX-U-005]
  description: "Enter sends, Esc cancels, Ctrl+K searches"
  method: browser
  route: /ai-ask
  auth: demo
  checks:
    - "Enter key sends message in Ask input"
    - "Esc key closes modal/dialog"
  expected: "Keyboard shortcuts functional"
  severity: P2

# Help documentation
- id: dfx-u-help
  test_plan_ids: [DFX-U-006]
  description: "Key features have tooltip/help explanation"
  method: browser
  auth: demo
  checks:
    - "Model selector has description"
    - "Feature toggles (web search, knowledge base) have tooltip"
  expected: "Help text available for non-obvious features"
  severity: P2

# Consistency
- id: dfx-u-consistency
  test_plan_ids: [DFX-U-007]
  description: "Same-type operations use consistent interaction patterns"
  method: browser
  auth: demo
  checks:
    - "All create actions use consistent button style"
    - "All delete actions have confirmation dialog"
    - "All lists have consistent sort/filter patterns"
  expected: "Interaction consistency across modules"
  severity: P1

# Accessible forms
- id: dfx-u-forms
  test_plan_ids: [DFX-U-008]
  description: "Form fields have labels, required fields marked"
  method: browser
  auth: demo
  checks:
    - "Input fields have associated labels or aria-label"
    - "Required fields have visual indicator"
  expected: "Forms are accessible and clear"
  severity: P2

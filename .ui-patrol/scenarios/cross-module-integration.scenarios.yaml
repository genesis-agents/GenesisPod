# Auth Chain Integration
- id: int-auth-no-token
  test_plan_ids: [AUT-TKN-001]
  description: "All APIs reject unauthenticated requests"
  method: api
  auth: none
  endpoints:
    - "/api/ai-ask/conversations"
    - "/api/ai-research/topics"
    - "/api/ai-teams/topics"
    - "/api/ai-writing/projects"
    - "/api/resources/libraries"
  expected: "All return 401"

- id: int-auth-expired-token
  test_plan_ids: [AUT-TKN-002]
  description: "All APIs reject expired JWT tokens"
  method: api
  auth: expired
  expected: "All return 401"

- id: int-credits-zero
  test_plan_ids: [BND-PRM-001]
  description: "AI calls rejected when credits = 0"
  method: api
  auth: demo
  credits: 0
  expected: "Friendly 'insufficient credits' message"

# End-to-End Scenarios
- id: e2e-full-research
  test_plan_ids: [E2E-001]
  description: "Full research workflow: Ask pre-research -> Research plan -> Execute -> Report -> PDF"
  expected: "Complete report with citations"

- id: e2e-kb-workflow
  test_plan_ids: [E2E-002]
  description: "Knowledge base workflow: Explore -> Collect -> Library -> Ask"
  expected: "Accurate Q&A from collected resources"

- id: e2e-team-decision
  test_plan_ids: [E2E-003]
  description: "Team decision: Create team -> Add agents -> Discuss -> Vote -> Report"
  expected: "Complete conclusion report"

- id: e2e-writing-workflow
  test_plan_ids: [E2E-004]
  description: "Writing workflow: New -> Outline -> Expand -> Consistency check -> Export"
  expected: "Coherent long-form content"

- id: e2e-ppt-workflow
  test_plan_ids: [E2E-005]
  description: "PPT workflow: Create -> Plan -> Generate -> Edit -> Export"
  expected: "Usable PPT file"

- id: e2e-mixture-comparison
  test_plan_ids: [E2E-006]
  description: "Multi-model comparison: Mixture ask -> Compare -> Choose best -> Deep follow-up"
  expected: "Distinct responses from each model"

# Cross-Module Integration Scenarios
# Covers: INT-LIB-ASK-001~003, INT-EXP-LIB-001~003, INT-RES-LIB-001~003,
#          INT-TMS-RES-001~002, AUT-TKN-001~002, E2E-001~010 from comprehensive-test-suite-2026-02-17.md

# Knowledge Base -> Ask Integration
- id: int-kb-create-then-ask
  test_plan_ids: [INT-LIB-ASK-001]
  route: /library
  auth: demo
  description: "Create knowledge base, then use it in Ask"
  assertions:
    - text_not_contains: "[object Object]"
    - text_not_contains: "Error"

- id: int-kb-multi-doc-ask
  test_plan_ids: [INT-LIB-ASK-002]
  description: "Upload 5+ documents to knowledge base, cross-document query in Ask"
  assertions:
    - text_not_contains: "Error"

- id: int-kb-update-sync
  test_plan_ids: [INT-LIB-ASK-003]
  description: "Add new doc to knowledge base, Ask immediately picks it up"
  assertions:
    - text_not_contains: "Error"

- id: int-kb-delete-graceful
  test_plan_ids: [INT-RAG-ASK-001]
  description: "Delete knowledge base, Ask shows friendly message"
  expected: "No crash, friendly 'knowledge base not found' message"

- id: int-kb-empty-ask
  test_plan_ids: [INT-RAG-ASK-002]
  description: "Empty knowledge base, Ask falls back to general response"
  expected: "Graceful degradation to general AI response"


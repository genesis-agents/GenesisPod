# AI Ask Combination Scenarios
# Covers: CMB-ASK-001~010, CMB-FT-001~008, CMB-CTX-001~007

# Model x Feature Combinations
- id: ask-grok-all-features
  route: /ai-ask
  auth: demo
  test_plan_ids: [CMB-ASK-001]
  description: "Grok with web search + knowledge base + file + quote"
  assertions:
    - element_visible: "textarea"
    - text_not_contains: "[object Object]"
    - text_not_contains: "undefined"

- id: ask-claude-all-features
  route: /ai-ask

- id: library-shows-resources
  route: /library
  auth: demo
  assertions:
    - selector: "[data-testid='resource-card'], .resource-card, [class*='ResourceCard']"
      exists: true

- id: library-no-raw-data
  route: /library
  auth: demo
  assertions:
    - text_not_contains: "[object Object]"
    - text_not_contains: "undefined"
    - text_not_contains: "NaN"

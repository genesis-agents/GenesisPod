# Chrome Mobile (Android)
- id: dfx-cp-chrome-mobile
  test_plan_ids: [DFX-CMP-005]
  description: "Chrome Mobile Android - basic usability"
  method: browser
  viewport: { width: 412, height: 915 }
  user_agent: "Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/120"
  pages:
    - /ai-ask
    - /explore
  checks:
    - "Page loads without errors"
    - "Navigation accessible"
    - "Message input usable"
  expected: "Basic functionality on mobile Chrome"

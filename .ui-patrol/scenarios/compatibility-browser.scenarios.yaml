# Browser Compatibility Scenarios
# Covers: DFX-CMP-001~005, DFX-RES-007 from comprehensive-test-suite-2026-02-17.md

# Chrome Desktop (primary)
- id: dfx-cp-chrome
  test_plan_ids: [DFX-CMP-001]
  description: "Chrome latest - full functionality"
  method: browser
  browser: chrome
  pages:
    - /ai-ask
    - /ai-research
    - /ai-teams
    - /ai-writing
    - /library
  checks:
    - "All pages load without errors"
    - "SSE streaming works"
    - "WebSocket connections established"
    - "File upload functional"
    - "All interactive elements responsive"
  expected: "100% functionality in Chrome latest"
  severity: P0


# AI Simulation (Decision) Page Spec
route: /ai-simulation
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Decision|AI Simulation"
    - tabs_or_filter: true
  main:
    - template_grid: "grid of simulation templates"
    - each_card: "title, description, companies count, roles count, status"

i18n_assertions:
  - "Companies"
  - "Roles"
  - "Start"
  - "Edit"
  - "Delete"
  - "Created"

quality:
  completeness:
    - "Template cards show title, description, companies, roles"
    - "Empty state shows create prompt"
  accuracy:
    - "Company/role counts are non-negative"
    - "Status labels match actual state"
  aesthetics:
    - "Template cards uniform height"
    - "Action buttons aligned consistently"
    - "Dark mode supported"
  interaction:
    - "Start launches simulation"
    - "Edit opens editor"
    - "Delete shows confirmation dialog"
    - "Loading state during simulation run"
  accessibility:
    - "Cards keyboard navigable"
    - "Delete button has aria-label"
  responsive:
    - "Grid stacks on mobile"
  performance:
    - "Simulation results stream without blocking UI"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "公司"
  - "角色"

# AI Simulation (Decision) Page Spec
route: /ai-simulation
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Decision|AI Simulation"
    - tabs_or_filter: true
  main:
    - template_grid: "grid of simulation templates"
    - each_card: "title, description, companies count, roles count, status"

i18n_assertions:
  - "Companies"
  - "Roles"
  - "Start"
  - "Edit"
  - "Delete"
  - "Created"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "公司"
  - "角色"

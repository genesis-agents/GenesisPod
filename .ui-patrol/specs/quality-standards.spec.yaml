# Quality Standards Spec
# Global quality evaluation criteria applied to ALL pages
# Referenced by config.yaml quality section

# ============================================================
# Severity Classification
# ============================================================
severity:
  critical: # 必须立即修复
    - "[object Object] / undefined / NaN 显示在页面上"
    - "页面白屏或 500 错误"
    - "功能按钮无响应"
    - "数据丢失或显示错误"
    - "English 模式下 UI 框架文本显示中文"

  high: # 当前版本必须修复
    - "broken images"
    - "时间戳显示 Invalid Date"
    - "暗色模式文字不可读"
    - "表单提交无反馈"
    - "空状态无提示（空白页面）"
    - "对比度不达标（WCAG AA）"

  medium: # 应尽快修复
    - "间距/对齐不一致"
    - "卡片高度不齐"
    - "Loading 状态缺失"
    - "移动端布局溢出"
    - "图标与文字未对齐"
    - "键盘无法导航到关键元素"

  low: # 改进项
    - "字体层级不够清晰"
    - "动画缺失或不流畅"
    - "懒加载未实现"
    - "aria-label 缺失"
    - "Toast 通知缺失"

# ============================================================
# Per-Tier Quality Requirements
# ============================================================
# Each page tier (critical/important/normal) has minimum quality levels

tier_requirements:
  critical: # Homepage, AI Research, AI Ask, AI Teams
    completeness: required
    accuracy: required
    aesthetics: required
    interaction: required
    accessibility: required
    responsive: required
    performance: required

  important: # Profile, AI Writing, AI Office, AI Simulation
    completeness: required
    accuracy: required
    aesthetics: required
    interaction: required
    accessibility: recommended
    responsive: recommended
    performance: recommended

  normal: # Feedback, Notifications, Share, Changelog
    completeness: required
    accuracy: required
    aesthetics: recommended
    interaction: recommended
    accessibility: optional
    responsive: optional
    performance: optional

# ============================================================
# Evaluation Scoring
# ============================================================
scoring:
  pass_threshold: 70 # Overall score >= 70 to pass
  weights:
    completeness: 20
    accuracy: 20
    aesthetics: 15
    interaction: 15
    accessibility: 10
    responsive: 10
    performance: 10

  grading:
    A: 90 # Excellent
    B: 80 # Good
    C: 70 # Acceptable
    D: 60 # Needs improvement
    F: 0 # Failing

# ============================================================
# Auto-fix Rules
# ============================================================
auto_fix:
  confidence_threshold: 70 # Only auto-fix when confidence >= 70%
  fixable_categories:
    - i18n_missing_translation
    - icon_missing
    - dark_mode_text_color
    - aria_label_missing
    - alt_text_missing
  requires_manual:
    - layout_redesign
    - ux_flow_change
    - performance_optimization
    - responsive_breakpoint_rework

route: /library
tier: critical
auth: demo

expected_structure:
  header:
    - heading: "Library"
  main:
    - search_input: true
    - filter_controls: true
    - content: "grid|list"

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 resource card"
      - "Each card has: title, type badge, date"
  empty:
    assertions:
      - "Shows empty state or no results message"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

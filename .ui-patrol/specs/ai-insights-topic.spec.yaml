# AI Insights Topic Detail Page — Comprehensive Spec
# Replaces old ai-research-topic.spec.yaml for the new /ai-insights route
route: /ai-insights/topic/:topicId
tier: critical
auth: session
sampleUrl: /ai-insights/topic/8a5a6aeb-b2dd-4673-80cd-73687db4f96c

# ============================================================
# Page Structure
# ============================================================
expected_structure:
  header:
    - back_button: "← arrow"
    - topic_icon: "icon or emoji"
    - topic_title: "heading level 1"
    - topic_description: "subtitle text"

  left_panel:
    - team_topology_canvas:
        - agent_nodes: "Leader, Researcher(s), Reviewer, Synthesizer"
        - connection_lines: "SVG paths between agents"
        - legend: "Leader, Working, Completed, Idle"
    - research_progress:
        - progress_bar: "percentage 0-100%"
        - task_count: "N/N tasks"
        - phase_indicator: "current phase name"
    - dimension_list:
        - each_dimension:
            - checkbox: true
            - name: "non-empty text"
            - status_badge: "PENDING|RESEARCHING|COMPLETED|FAILED"
    - research_controls:
        - depth_selector: "Quick|Standard|Thorough|All VS Features"
        - action_buttons: "Start|Refresh|Cancel"

  right_panel:
    tabs:
      # ─── Tab 1: 待办列表 ───
      - name: "待办列表"
        id: todos
        content:
          - todo_list: "list of research tasks"
          - each_todo:
              - title: "non-empty text"
              - status: "PENDING|IN_PROGRESS|COMPLETED|FAILED|CANCELLED"
              - priority_indicator: "optional"
              - action_buttons: "Pause|Resume|Cancel|Retry"

      # ─── Tab 2: 协作动态 ───
      - name: "协作动态"
        id: collaboration
        content:
          - agent_thinking_graph: "visualization of agent reasoning"
          - research_timeline: "chronological event list"
          - pipeline_phase_indicator: "current phase with progress"
          - review_result_cards: "quality review outcomes"

      # ─── Tab 3: 洞察报告 ───
      - name: "洞察报告"
        id: report
        content:
          - view_toggle: "连续视图 (continuous) | 章节视图 (chapterized)"
          - version_selector: "v1, v2, ..."
          - toolbar:
              - copy_button: true
              - export_button: true
              - fullscreen_button: true
              - share_button: true
              - delete_button: true
          - report_body:
              continuous_view:
                - markdown_rendered_content: "full report in markdown"
                - heading_hierarchy: "H1 title, H2 sections, H3 subsections"
                - inline_citations: "[N] reference markers"
                - latex_formulas: "rendered KaTeX elements"
                - chart_figures: "embedded images from research"
                - word_count: "NNN 字"
              chapterized_view:
                - chapter_navigation: "← Chapter N: Name →"
                - chapter_content: "dimension detailedContent rendered"
                - outline_nav: "sidebar with section anchors"
                - reading_mode_toggle: "eye icon"
                - edit_mode_toggle: "pencil icon"

      # ─── Tab 4: 研究历史 ───
      - name: "研究历史"
        id: history
        content:
          - timeline: "chronological research sessions"
          - each_session:
              - date: "valid date"
              - status: "Completed|Failed"
              - dimension_count: "N dimensions"
              - source_count: "N sources"

      # ─── Tab 5: 可信度 ───
      - name: "可信度"
        id: credibility
        content:
          - overall_score: "circle with 0-100 number"
          - sub_scores: "Authority, Diversity, Timeliness, Coverage"
          - source_assessment: "collapsible section"
          - action_buttons: "Recalculate, Re-analyze"

      # ─── Tab 6: 参考文献 ───
      - name: "参考文献"
        id: references
        content:
          - stats: "N sources, High N, Medium N, Low N"
          - filter: "dropdown or tabs"
          - reference_list: "title, domain, credibility score, link"

      # ─── Tab 7: 相关研究 ───
      - name: "相关研究"
        id: related
        content:
          - related_topics_list: "cards of related research topics"

# ============================================================
# Report Rendering — Critical Assertions
# ============================================================
report_rendering:
  # ─── LaTeX Formula Rendering ───
  latex:
    must_render:
      - "No raw \\text{} commands visible as text"
      - "No raw \\frac{} commands visible as text"
      - "No raw \\approx visible as text"
      - "No raw \\times visible as text (should be × or rendered)"
      - "No raw \\sum, \\prod, \\int visible as text"
      - ".katex elements present when formulas exist"
      - "No .katex-error elements"
    edge_cases:
      - "Inline math $x$ renders correctly"
      - "Display math $$...$ renders correctly"
      - "Nested \\text{} in subscripts: C_{\\text{task}} renders"
      - "\\frac with \\text: \\frac{\\text{a}}{\\text{b}} renders"
      - "Chinese in \\text: \\text{步数} renders"
      - "Long inline formula with \\frac does not fragment"
      - "Currency $147B not confused with LaTeX delimiter"

  # ─── Content Completeness ───
  completeness:
    continuous_view:
      - "All dimensions from dimensionAnalyses are rendered"
      - "Dimension count in report matches dimensionAnalyses.length"
      - "fullReport not truncated (length >= sum of dimension summaries)"
      - "References section present at bottom"
      - "No chart placeholder text leaked (<!-- chart:xxx -->)"
      - "No figure placeholder text leaked (<!-- figure:N:M -->)"
    chapterized_view:
      - "Chapter count matches dimension count"
      - "Each chapter has detailedContent rendered (not just summary)"
      - "Chapter navigation shows all chapter names"
      - "Word count per chapter displayed"

  # ─── Chart/Figure Rendering ───
  charts:
    - "Chart placeholders resolved to images or empty"
    - "No raw <!-- chart:xxx --> text visible"
    - "Figure captions display below images"
    - "Figure numbering sequential (图 1, 图 2, ...)"

  # ─── Citation Rendering ───
  citations:
    - "Citation markers [N] are visible"
    - "Citation numbers are sequential"
    - "Hovering citation shows tooltip with reference info"
    - "References section has matching entries"

# ============================================================
# Report Operations
# ============================================================
report_operations:
  export:
    - trigger: "click export button"
    - assert: "export dialog opens"
    - formats: ["PDF", "DOCX"]
    - verify: "download starts or job status shown"
    - edge_case: "WYSIWYG fallback shows toast on network error"

  ai_edit:
    - trigger: "select text → AI edit toolbar appears"
    - operations: ["expand", "shorten", "rephrase", "tone"]
    - assert: "edited content replaces selection"
    - edge_case: "edit preserves surrounding LaTeX formulas"

  version_history:
    - trigger: "click version selector"
    - assert: "version list dropdown shows"
    - action: "select older version"
    - assert: "report content changes to selected version"

  annotations:
    - trigger: "select text → add annotation"
    - assert: "annotation highlight appears"
    - verify: "annotation panel shows annotation"

# ============================================================
# Research Controls
# ============================================================
research_controls:
  start_research:
    - precondition: "topic in DRAFT or ACTIVE state"
    - trigger: "click Start/Refresh button"
    - assert: "research starts, progress updates via WebSocket"
    - verify: "team topology shows agents working"
    - verify: "todo list populates with tasks"

  leader_instruction:
    - trigger: "type in instruction input → send"
    - assert: "leader processes instruction"
    - verify: "mission adjusts based on instruction"

  cancel_research:
    - trigger: "click Cancel button"
    - assert: "confirmation dialog appears"
    - verify: "research stops, status updates"

# ============================================================
# WebSocket Real-time Updates
# ============================================================
websocket:
  events:
    - "mission:status — progress bar updates"
    - "leader:thinking — thinking indicator appears"
    - "agent:working — team topology node animates"
    - "task:completed — todo list item status changes"
    - "dimension:completed — dimension badge updates"
    - "report:ready — report tab becomes available"
  reconnect:
    - "After network blip, WebSocket reconnects"
    - "Missed events are synced via sync:request"

# ============================================================
# Quality Assessment (7 Levels)
# ============================================================
quality:
  # L1 - 内容完整性
  completeness:
    - "7 tabs all render content (not blank)"
    - "Report body has actual markdown content"
    - "All dimensions present in both view modes"
    - "References section has sources with URLs"
    - "Team topology shows all agent types"
    - "Todo list shows tasks when research is active/completed"
    - "Credibility scores render as numbers 0-100"

  # L2 - 内容准确性
  accuracy:
    - "Dimension count matches between tabs"
    - "Reference count matches between report citations and references tab"
    - "Progress percentage is 0-100"
    - "Credibility sub-scores sum reasonably"
    - "Word count matches actual content length"
    - "Version number increments correctly"
    - "LaTeX formulas render mathematically correct output"

  # L3 - 视觉/美学
  aesthetics:
    - "Report typography: headings hierarchy clear"
    - "LaTeX formulas: inline formulas align with text baseline"
    - "LaTeX formulas: display formulas centered"
    - "Charts: images not distorted or overflowing"
    - "Citations: [N] markers styled consistently"
    - "Left/right panel balanced width"
    - "Chapter navigation: clean, compact"

  # L4 - 交互体验
  interaction:
    - "Tab switching is instant (< 300ms perceived)"
    - "View mode toggle (continuous/chapter) switches smoothly"
    - "Chapter navigation (← →) changes chapter content"
    - "Export button shows loading state during export"
    - "AI edit toolbar appears on text selection"
    - "Scroll position preserved when switching tabs"
    - "Loading skeleton shown during report fetch"
    - "Error state shows retry button"

  # L5 - 可访问性
  accessibility:
    - "All tabs reachable via keyboard"
    - "Report content navigable with screen reader"
    - "Focus ring visible on interactive elements"
    - "Chart images have alt text"

  # L6 - 响应式
  responsive:
    - "At 1024px: left panel collapses"
    - "At 768px: tabs become scrollable"
    - "At 375px: report readable, no horizontal scroll"
    - "Chart images scale down proportionally"
    - "LaTeX formulas: long formulas wrap or scroll"

  # L7 - 性能
  performance:
    - "Report tab initial render < 2s"
    - "Chapter switch < 500ms"
    - "LaTeX rendering complete within 1s of content load"
    - "Large report (160K+ chars) renders without crash"
    - "References list (300+ items) paginated or virtualized"
    - "No layout shift when async content loads"

# ============================================================
# Forbidden Patterns
# ============================================================
forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "Error:"
  - "Cannot read properties"
  - "<!-- chart:"
  - "<!-- figure:"
  - "\\text{"
  - "\\frac{"
  - "\\approx"
  - "LATEX"
  - "加载失败"


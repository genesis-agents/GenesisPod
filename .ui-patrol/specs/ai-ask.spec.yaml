# AI Ask Page Spec
route: /ai-ask
tier: critical
auth: session

expected_structure:
  main:
    - chat_input: "textarea for questions"
    - model_selector: "dropdown or buttons for model selection"
    - conversation_area: "message list"

data_states:
  initial:
    assertions:
      - "Chat input is visible and enabled"
      - "Model selector is visible"

i18n_assertions:
  - "AI Ask"

quality:
  completeness:
    - "Chat input visible and enabled"
    - "Model selector shows available models"
    - "Conversation area renders messages with proper formatting"
  accuracy:
    - "Model names match actual available models"
    - "Message timestamps are valid"
  aesthetics:
    - "Chat bubbles have consistent styling (user vs AI)"
    - "Input area fixed at bottom, not overlapping messages"
    - "Dark mode: message bubbles readable"
    - "Code blocks in responses properly syntax-highlighted"
  interaction:
    - "Enter sends message, Shift+Enter for newline"
    - "Streaming response shows typing indicator"
    - "Model switch is smooth with no data loss"
    - "Error state shows retry option"
  accessibility:
    - "Chat input has proper label/placeholder"
    - "Messages are in a scrollable region with aria-live"
  responsive:
    - "Chat layout fills screen on mobile"
    - "Model selector accessible on narrow screens"
  performance:
    - "Streaming tokens render without jank"
    - "Long conversations don't cause scroll lag"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "Error"

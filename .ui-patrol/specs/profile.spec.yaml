# Profile Page Spec
route: /profile
tier: important
auth: session

expected_structure:
  main:
    - user_info: "avatar, name, email"
    - tabs: "Profile|API Keys|Preferences"

sub_tabs:
  - name: "API Keys"
    content:
      - heading: "API Keys|User API Keys"
      - key_list_or_empty: true
      - add_button: "Add Key|New Key"
    i18n_assertions:
      - "API Keys"
      - "Add"
      - "Key Name"
      - "Provider"
      - "Status"
      - "Active"
      - "Delete"
      - "No API keys"

quality:
  completeness:
    - "Avatar, name, email all rendered"
    - "All tabs load content (not blank)"
    - "API Keys tab shows key list or empty state"
  accuracy:
    - "Key status (Active/Inactive) matches actual state"
    - "Provider names are valid"
  aesthetics:
    - "Avatar is circular and properly sized"
    - "Tabs evenly spaced"
    - "Dark mode supported"
  interaction:
    - "Add Key button opens modal/form"
    - "Delete key shows confirmation"
    - "Tab switching smooth"
  accessibility:
    - "Tabs have proper ARIA roles (tablist/tab/tabpanel)"
    - "Delete buttons have descriptive labels"
  responsive:
    - "Tabs stack or scroll on mobile"
  performance:
    - "Tab content loads without layout shift"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

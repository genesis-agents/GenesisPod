# Credits Page Spec
route: /credits
tier: normal
auth: session

expected_structure:
  main:
    - balance_display: "current credits balance"
    - usage_history: "list or table of credit usage"

i18n_assertions:
  - "Credits"
  - "Balance"
  - "Usage"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

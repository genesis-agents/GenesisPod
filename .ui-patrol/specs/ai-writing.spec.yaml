# AI Writing Page Spec
route: /ai-writing
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Writing"
    - create_button: true
  main:
    - project_list: true

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 writing project"
      - "Each project has: name, genre, word count, status"
  empty:
    assertions:
      - "Shows empty state or create prompt"

sub_routes:
  - route: /ai-writing/:id
    expected_structure:
      main:
        - editor: "rich text editor area"
        - sidebar: "chapter list, outline, settings"
        - toolbar: "formatting options"

i18n_assertions:
  - "AI Writing"
  - "Create"
  - "Start Writing"
  - "words"
  - "Draft"
  - "Revising"
  - "Completed"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "开始创作"
  - "修订中"

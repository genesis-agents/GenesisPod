# AI Writing Page Spec
route: /ai-writing
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Writing"
    - create_button: true
  main:
    - project_list: true

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 writing project"
      - "Each project has: name, genre, word count, status"
  empty:
    assertions:
      - "Shows empty state or create prompt"

sub_routes:
  - route: /ai-writing/:id
    expected_structure:
      main:
        - editor: "rich text editor area"
        - sidebar: "chapter list, outline, settings"
        - toolbar: "formatting options"

i18n_assertions:
  - "AI Writing"
  - "Create"
  - "Start Writing"
  - "words"
  - "Draft"
  - "Revising"
  - "Completed"

quality:
  completeness:
    - "Project list shows title, genre, word count, status"
    - "Empty state shows create prompt"
    - "Detail page: editor, sidebar, toolbar all render"
  accuracy:
    - "Word counts are valid numbers"
    - "Status labels match project state"
  aesthetics:
    - "Editor area has comfortable reading width"
    - "Sidebar chapters properly indented"
    - "Dark mode: editor background and text readable"
  interaction:
    - "Create button opens project creation"
    - "Editor supports real-time typing without lag"
    - "Auto-save indicator visible"
    - "Chapter navigation in sidebar works"
  accessibility:
    - "Editor has proper ARIA role"
    - "Toolbar buttons have tooltips/aria-labels"
  responsive:
    - "Sidebar collapses on mobile"
    - "Toolbar adapts to narrow width"
  performance:
    - "Large documents don't cause editor lag"
    - "Auto-save doesn't block typing"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "开始创作"
  - "修订中"

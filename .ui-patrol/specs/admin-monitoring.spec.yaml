# Admin Monitoring Dashboard Spec
route: /admin/system/monitoring
tier: critical
auth: session

expected_structure:
  header:
    - heading: "System Monitoring|Monitoring"
  main:
    - metrics_cards:
        - cpu_usage: "percentage display"
        - memory_usage: "total/used/free"
        - system_uptime: "uptime duration"
        - active_tasks: "count"
        - error_rate: "percentage"
    - running_tasks_table:
        - columns: "task name, progress, status"
    - ai_diagnosis:
        - tools_health: "status indicator"
        - skills_health: "status indicator"
        - mcp_servers: "status indicator"
    - auto_refresh: "30s interval toggle"

i18n_assertions:
  - "Monitoring"
  - "CPU"
  - "Memory"
  - "Uptime"
  - "Active Tasks"
  - "Error Rate"
  - "Running Tasks"
  - "AI Diagnosis"
  - "Refresh"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "Error"

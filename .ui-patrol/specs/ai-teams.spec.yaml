# AI Teams Page Spec
route: /ai-teams
tier: important
auth: session

expected_structure:
  header:
    - heading: "My Teams"
  main:
    - team_list: "grid or list of teams"
    - each_card: "team name, member count, status"

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 topic item"
      - "Each item has: name, member count or description"
  empty:
    assertions:
      - "Shows empty state"
      - "Has create button"

i18n_assertions:
  - "My Teams"
  - "Create"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

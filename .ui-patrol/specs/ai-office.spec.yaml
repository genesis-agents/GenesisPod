# AI Office (Reports) Page Spec
route: /ai-office
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Reports|AI Office"
  main:
    - content_list: "slides/documents"

sub_routes:
  - route: /ai-office/slides
    expected_structure:
      main:
        - slides_list: "grid or list of slide decks"
        - each_item: "title, page count, date, actions"

i18n_assertions:
  - "AI Reports"
  - "Create"
  - "pages"

quality:
  completeness:
    - "Document/slide list renders with titles and dates"
    - "Each item has page count and actions"
  accuracy:
    - "Page counts are positive integers"
    - "Dates formatted correctly"
  aesthetics:
    - "List items have consistent layout"
    - "Dark mode supported"
  interaction:
    - "Create button opens creation flow"
    - "Items clickable to detail view"
    - "Loading skeleton on fetch"
  accessibility:
    - "List items keyboard navigable"
  responsive:
    - "List adapts to mobile width"
  performance:
    - "Document thumbnails lazy-loaded"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

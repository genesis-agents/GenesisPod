# AI Image Page Spec
route: /ai-image
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Image"
    - create_button: true
  main:
    - image_grid: "gallery of generated images"
    - each_card: "thumbnail, prompt text, date, actions"

i18n_assertions:
  - "AI Image"
  - "Create"
  - "No images yet"

quality:
  completeness:
    - "Image grid shows thumbnails (not broken images)"
    - "Each card has prompt text and date"
    - "Empty state shows create prompt"
  accuracy:
    - "Dates are valid and formatted"
    - "Thumbnails match generated images"
  aesthetics:
    - "Image grid has uniform card sizes"
    - "Thumbnails maintain aspect ratio (no stretching)"
    - "Dark mode: card borders and backgrounds correct"
  interaction:
    - "Create button opens generation flow"
    - "Click image to view full size"
    - "Loading state during image generation"
  accessibility:
    - "Images have alt text (prompt as fallback)"
  responsive:
    - "Grid columns reduce on mobile (3->2->1)"
  performance:
    - "Thumbnails lazy-loaded"
    - "No layout shift as images load"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

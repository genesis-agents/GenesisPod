# Admin AI Models Spec
route: /admin/ai/models
tier: important
auth: session

expected_structure:
  header:
    - heading: "AI Models|Model Management"
  main:
    - model_list: "table or cards of configured AI models"
    - each_item: "model name, provider, status, actions"

i18n_assertions:
  - "Models"
  - "Provider"
  - "Status"
  - "Active"
  - "Disabled"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

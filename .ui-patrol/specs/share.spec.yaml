# Share Pages Spec (public, no auth required)
route: /share/*
tier: normal
auth: none

sub_routes:
  - route: /share/topic/:id
    expected_structure:
      main:
        - topic_content: "shared research topic view"
  - route: /share/writing/:id
    expected_structure:
      main:
        - writing_content: "shared writing document view"
  - route: /share/image/:id
    expected_structure:
      main:
        - image_display: "shared image view"

quality:
  completeness:
    - "Shared content renders (not blank or error)"
    - "No login prompt shown (public pages)"
  accuracy:
    - "Content matches the shared item"
  aesthetics:
    - "Clean read-only layout without editing controls"
    - "Dark mode supported"
  interaction:
    - "Invalid share ID shows friendly 404 (not raw error)"
  accessibility:
    - "Content readable with proper heading hierarchy"
  responsive:
    - "Content adapts to mobile"
  performance:
    - "Page loads without auth delay"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "403"
  - "Not Found"

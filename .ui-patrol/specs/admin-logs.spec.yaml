# Admin Logs & Audit Spec
route: /admin/system/logs
tier: important
auth: session

expected_structure:
  header:
    - heading: "Logs|Audit"
  main:
    - stats_cards:
        - total_logins: "count"
        - today_logins: "count"
        - total_tasks: "count"
        - failed_tasks: "count"
    - tabs: "Login History|Task History"
    - login_table:
        - columns: "email, timestamp, IP, device, browser, location"
    - task_table:
        - columns: "name, source, status, items"
    - pagination: true

i18n_assertions:
  - "Login History"
  - "Task History"
  - "Total"
  - "Today"
  - "Failed"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

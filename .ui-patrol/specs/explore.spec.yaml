# Explore Page Spec
route: /explore
tier: normal
auth: session

expected_structure:
  header:
    - heading: "AI Explore|Explore"
    - search_input: true
  main:
    - content_grid: "reports, resources, or topics"

i18n_assertions:
  - "Explore"
  - "Search"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

# Homepage Spec
route: /
tier: critical
auth: session

expected_structure:
  main:
    - dashboard_or_landing: "overview of recent activity or app entry points"

i18n_assertions:
  - "AI Teams"

quality:
  completeness:
    - "Dashboard shows recent activity or entry points (not blank)"
    - "Navigation to all core apps accessible"
  accuracy:
    - "Recent activity timestamps are valid dates"
  aesthetics:
    - "Entry point cards evenly spaced"
    - "Dark mode fully supported"
  interaction:
    - "Cards are clickable and navigate correctly"
    - "Loading skeleton shown on initial load"
  accessibility:
    - "Navigation landmarks present (nav/main)"
    - "All links have descriptive text"
  responsive:
    - "Cards stack vertically on mobile"
  performance:
    - "First contentful paint < 2s"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

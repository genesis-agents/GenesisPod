# Feedback Page Spec
route: /feedback
tier: normal
auth: session

expected_structure:
  main:
    - feedback_form: "textarea for feedback submission"
    - submit_button: true
    - category_selector: "bug|feature|other"

sub_routes:
  - route: /feedback/history
    expected_structure:
      main:
        - feedback_list: "table or list of past feedback"
        - each_item: "title, category, status, date"

i18n_assertions:
  - "Feedback"
  - "Submit"
  - "History"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

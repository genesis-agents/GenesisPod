# Aesthetic checks
aesthetic:
  - "Score labels should not wrap to multiple lines"
  - "Research Depth buttons should fit on one line without wrapping"
  - "Tab names should be fully visible without truncation"
  - "Source distribution bar legend should wrap gracefully"
  - "Star ratings should align horizontally"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "加载失败"
  - "获取.*失败"

# AI Social Page Spec
route: /ai-social
tier: normal
auth: session

expected_structure:
  header:
    - heading: "AI Social"
    - create_button: true
  main:
    - content_list: "social media content items"
    - tabs: "filter by platform or status"

i18n_assertions:
  - "AI Social"
  - "Create"
  - "Draft"
  - "Published"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

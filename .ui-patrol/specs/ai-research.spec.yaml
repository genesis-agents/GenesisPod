# AI Research List Page Spec
route: /ai-research
tier: critical
auth: session

expected_structure:
  header:
    - heading: "AI Research"
    - create_button: "variant: primary"
  main:
    - tab_navigation: true
    - content: "grid|list"

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 topic card"
      - "Each card has: title, status label, date"
  empty:
    assertions:
      - "Shows EmptyState component"
      - "Has create button"

i18n_assertions:
  - "AI Research"
  - "Create"
  - "Completed"
  - "In Progress"
  - "Failed"

quality:
  completeness:
    - "Topic cards render with title, status, date"
    - "Empty state shows create prompt when no topics"
  accuracy:
    - "Status labels match actual state (Completed/In Progress/Failed)"
    - "Dates are valid and in locale format"
  aesthetics:
    - "Cards in grid have uniform height"
    - "Status badges use consistent color coding"
    - "Dark mode: card backgrounds and text readable"
  interaction:
    - "Create button opens creation flow"
    - "Cards are clickable to topic detail"
    - "Loading skeleton shown during data fetch"
  accessibility:
    - "Grid items navigable via keyboard"
    - "Status conveyed by text + color (not color only)"
  responsive:
    - "Grid collapses to single column on mobile"
  performance:
    - "List renders without layout shift"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

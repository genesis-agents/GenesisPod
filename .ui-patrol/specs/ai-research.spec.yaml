# AI Research List Page Spec
route: /ai-research
tier: critical
auth: session

expected_structure:
  header:
    - heading: "AI Research"
    - create_button: "variant: primary"
  main:
    - tab_navigation: true
    - content: "grid|list"

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 topic card"
      - "Each card has: title, status label, date"
  empty:
    assertions:
      - "Shows EmptyState component"
      - "Has create button"

i18n_assertions:
  - "AI Research"
  - "Create"
  - "Completed"
  - "In Progress"
  - "Failed"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

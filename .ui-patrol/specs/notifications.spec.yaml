# Notifications Page Spec
route: /notifications
tier: normal
auth: session

expected_structure:
  main:
    - notification_list: "list of notifications"
    - each_item: "title, message, timestamp, read/unread indicator"
    - mark_all_read: "button to mark all as read"

i18n_assertions:
  - "Notifications"
  - "Mark all as read"

quality:
  completeness:
    - "Notification list renders items or empty state"
    - "Each item has title, message, timestamp, read indicator"
  accuracy:
    - "Timestamps are valid and relative (e.g. '2 hours ago')"
    - "Read/unread state visually distinct"
  aesthetics:
    - "Unread items have visual emphasis (bold/dot)"
    - "Dark mode supported"
  interaction:
    - "Mark all as read updates UI immediately"
    - "Click notification navigates to source"
  accessibility:
    - "Unread status conveyed to screen readers"
  responsive:
    - "List adapts to mobile width"
  performance:
    - "Long notification lists paginated"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

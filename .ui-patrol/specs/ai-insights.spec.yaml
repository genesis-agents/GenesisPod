# AI Insights List Page Spec
route: /ai-insights
tier: critical
auth: session

expected_structure:
  header:
    - heading: "heading level 1 or 2"
    - create_button: "button with + or Create"
    - search_input: "search input field"
  main:
    - topic_grid_or_list: "grid or list of topic cards"
    - each_card:
        - topic_icon: true
        - topic_title: "non-empty text"
        - topic_type_badge: "MACRO|TECHNOLOGY|COMPANY|EVENT"
        - status_badge: "DRAFT|ACTIVE|PAUSED|ARCHIVED"
        - latest_report_preview: "optional summary text"
        - date: "valid date string"
        - action_menu: "edit, delete, share"

data_states:
  with_data:
    assertions:
      - "Page contains at least 1 topic card"
      - "Each card has clickable title linking to /ai-insights/topic/:id"
  empty:
    assertions:
      - "Shows friendly empty state with create prompt"
      - "No [object Object] or undefined text"

i18n_assertions:
  - "Create"
  - "Search"
  - "Active"
  - "Paused"
  - "Archived"

quality:
  completeness:
    - "Topic cards render with title, status, type, date"
    - "Empty state shows create prompt when no topics"
    - "Search filters topics by name"
  accuracy:
    - "Status labels match actual state"
    - "Dates are valid and in locale format"
    - "Topic count matches visible cards"
  aesthetics:
    - "Cards in grid have uniform height"
    - "Status badges use consistent color coding"
  interaction:
    - "Create button opens creation dialog"
    - "Cards are clickable to topic detail"
    - "Search input filters in real-time"
    - "Loading skeleton shown during data fetch"
  responsive:
    - "Grid collapses to single column on mobile"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"
  - "Error"

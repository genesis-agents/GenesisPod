# Admin Overview Spec
route: /admin/overview
tier: important
auth: session

expected_structure:
  header:
    - heading: "Admin|Dashboard"
  sidebar:
    - nav_sections:
        - "Overview"
        - "Access": "Users|Permissions|Security|Billing|Credits|Secrets"
        - "AI": "Models|Tools|Skills|Teams"
        - "System": "Monitoring|Logs|Email|Notifications|Site|Storage"
        - "Data": "Collection|Quality|Whitelists"

i18n_assertions:
  - "Overview"
  - "Users"
  - "Models"
  - "Monitoring"
  - "System"

forbidden:
  - "[object Object]"
  - "undefined"
  - "NaN"

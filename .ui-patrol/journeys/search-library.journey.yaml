id: search-library
tier: critical
auth: demo
steps:
  - navigate: /library
  - wait: "input[type='search'], input[placeholder*='Search'], [data-testid='search-input']"
  - fill:
      "input[type='search'], input[placeholder*='Search'], [data-testid='search-input']": "[TEST]"
  - wait_for_network: idle
  - assert:
      text_not_contains: "[object Object]"
      text_not_contains: "undefined"

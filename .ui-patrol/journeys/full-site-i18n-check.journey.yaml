# Journey: Full site i18n check - verify English mode across all pages
id: full-site-i18n-check
tier: critical
auth: session
description: "Navigate through all major pages and verify English translations are working"

steps:
  # 1. AI Ask
  - navigate: /ai-ask
  - wait: 3000
  - screenshot: "i18n-ai-ask"
  - assert:
      - text_visible: "AI Ask"

  # 2. AI Research list
  - navigate: /ai-research
  - wait: 3000
  - screenshot: "i18n-ai-research"
  - assert:
      - text_visible: "AI Research"

  # 3. AI Writing list
  - navigate: /ai-writing
  - wait: 3000
  - screenshot: "i18n-ai-writing"
  - assert:
      - text_visible: "AI Writing"
      - text_not_visible: "开始创作"

  # 4. AI Image
  - navigate: /ai-image
  - wait: 3000
  - screenshot: "i18n-ai-image"

  # 5. AI Simulation
  - navigate: /ai-simulation
  - wait: 3000
  - screenshot: "i18n-ai-simulation"
  - assert:
      - text_not_visible: "公司"
      - text_not_visible: "角色"

  # 6. AI Office / Reports
  - navigate: /ai-office
  - wait: 3000
  - screenshot: "i18n-ai-office"

  # 7. AI Social
  - navigate: /ai-social
  - wait: 3000
  - screenshot: "i18n-ai-social"

  # 8. Library
  - navigate: /library
  - wait: 3000
  - screenshot: "i18n-library"

  # 9. Explore
  - navigate: /explore
  - wait: 3000
  - screenshot: "i18n-explore"

  # 10. Profile
  - navigate: /profile
  - wait: 3000
  - screenshot: "i18n-profile"

  # 11. AI Teams
  - navigate: /ai-teams
  - wait: 3000
  - screenshot: "i18n-ai-teams"

  # 12. AI Store
  - navigate: /ai-store
  - wait: 3000
  - screenshot: "i18n-ai-store"

  # 13. Notifications
  - navigate: /notifications
  - wait: 3000
  - screenshot: "i18n-notifications"

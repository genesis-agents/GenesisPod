# E2E Image + Writing Workflow Journey
# Covers: E2E-008 from comprehensive-test-plan-2026-02-06.md

name: Image + Writing Content Creation
description: "Test end-to-end workflow: Research materials → Image generation → Writing composition"
auth: demo
test_plan_ids: [E2E-008]

steps:
  # Step 1: Research for source material
  - id: navigate-research
    action: navigate
    route: /ai-research
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Start with research for content materials"

  # Step 2: Image generation
  - id: navigate-image
    action: navigate
    route: /ai-image
    assertions:
      - page_loaded: true
      - text_not_contains: "[object Object]"
    description: "AI Image page loads"

  - id: navigate-image-create
    action: navigate
    route: /ai-image/create
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Image creation page loads with prompt input"

  - id: verify-image-form
    action: snapshot
    assertions:
      - element_exists: "textarea, input"
    description: "Image prompt input area present"

  # Step 3: Writing composition
  - id: navigate-writing
    action: navigate
    route: /ai-writing
    assertions:
      - page_loaded: true
      - text_not_contains: "[object Object]"
    description: "AI Writing page loads"

  - id: verify-writing-create
    action: snapshot
    assertions:
      - text_not_contains: "Error"
    description: "Writing project creation available"

  # Step 4: Verify cross-module data references
  - id: cross-module-note
    action: note
    description: "Research materials can reference images; Writing can embed generated images"

  # Success criteria
  - id: workflow-complete
    action: note
    description: "Complete image+writing workflow produces coherent content with visuals"

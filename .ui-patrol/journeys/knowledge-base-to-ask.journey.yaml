# Knowledge Base to Ask Integration Journey
# Covers: INT-LIB-ASK-001~003, INT-RAG-ASK-001~002, E2E-002 from comprehensive-test-suite-2026-02-17.md
id: knowledge-base-to-ask
tier: critical
auth: demo
description: >
  Tests cross-module integration: Library (knowledge base) -> AI Ask.
  Verifies knowledge bases are accessible from Ask, content is searchable.

steps:
  # Step 1: Navigate to Library and verify knowledge bases exist
  - navigate: /library
  - wait: "main, [data-testid='library-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Step 2: Navigate to Ask and verify knowledge base selector
  - navigate: /ai-ask
  - wait: "textarea, [data-testid='chat-input']"
  - assert:
      element_visible: "textarea, [data-testid='chat-input']"
      text_not_contains:
        - "[object Object]"
        - "undefined"

  # Step 3: Verify knowledge base selector is available in Ask
  - assert:
      element_visible: "[data-testid='knowledge-base-selector'], .knowledge-base-select, button[aria-label*='knowledge']"

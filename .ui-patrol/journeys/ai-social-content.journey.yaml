# AI Social Content Journey
# Covers: SOC-001~003 from comprehensive-test-plan-2026-02-06.md

name: AI Social Content Creation
description: "Test social content generation, queue management, and MCP integration"
auth: demo
test_plan_ids: [SOC-001, SOC-002, SOC-003]

steps:
  # SOC-001: Generate social post
  - id: navigate-social
    action: navigate
    route: /ai-social
    assertions:
      - page_loaded: true
      - text_not_contains: "[object Object]"
      - text_not_contains: "Error"

  - id: create-social-post
    action: navigate
    route: /ai-social/create
    test_plan_ids: [SOC-001]
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Social post creation page loads"

  - id: verify-social-form
    action: snapshot
    test_plan_ids: [SOC-001]
    assertions:
      - element_exists: "textarea, input[type=text]"
    description: "Form elements present for content generation"

  # SOC-002: Publish queue management
  - id: verify-queue-ui
    action: snapshot
    route: /ai-social
    test_plan_ids: [SOC-002]
    assertions:
      - text_not_contains: "[object Object]"
    description: "Social content list / publish queue displays correctly"

  # SOC-003: MCP client integration (code-level check)
  - id: mcp-integration-note
    action: note
    test_plan_ids: [SOC-003]
    description: "MCP client integration verified via unit test (useAISocial.test.ts → FE-DM-001)"

# E2E New User Onboarding Journey
# Covers: E2E-007 from comprehensive-test-plan-2026-02-06.md

name: New User Onboarding Flow
description: "Test complete new user journey: first Ask, first Research, first Teams"
auth: demo
test_plan_ids: [E2E-007]

steps:
  # Step 1: Landing page
  - id: landing-page
    action: navigate
    route: /
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Homepage loads with navigation to all features"

  # Step 2: First Ask experience
  - id: navigate-ask
    action: navigate
    route: /ai-ask
    assertions:
      - page_loaded: true
      - text_not_contains: "[object Object]"
    description: "AI Ask page loads for first-time user"

  - id: verify-ask-input
    action: snapshot
    assertions:
      - element_exists: "textarea, input"
    description: "Message input area is visible and accessible"

  # Step 3: First Research experience
  - id: navigate-research
    action: navigate
    route: /ai-research
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Research page accessible from navigation"

  - id: verify-research-create
    action: snapshot
    assertions:
      - text_not_contains: "[object Object]"
    description: "Research topic creation interface visible"

  # Step 4: First Teams experience
  - id: navigate-teams
    action: navigate
    route: /ai-teams
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Teams page accessible from navigation"

  - id: verify-teams-create
    action: snapshot
    assertions:
      - text_not_contains: "[object Object]"
    description: "Team creation interface visible"

  # Step 5: Navigation flow check
  - id: verify-nav-depth
    action: note
    description: "All features reachable within 2 clicks from homepage (DFX-U-002)"

  # Success criteria
  - id: onboarding-complete
    action: note
    description: "New user can access Ask, Research, Teams within 3 minutes of landing"

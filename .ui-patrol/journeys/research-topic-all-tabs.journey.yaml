# Journey: Navigate through all tabs of a Research Topic
id: research-topic-all-tabs
tier: critical
auth: session
description: "Navigate through every tab on the Research Topic detail page, verifying i18n and layout"

steps:
  - navigate: /ai-research/topic/475fea3c-bd61-4c99-9498-4e09edc11eed
  - wait: "button:has-text('Tasks')"
  - screenshot: "topic-tasks-tab"
  - assert:
      - text_visible: "Task List"
      - text_visible: "Conversation with Leader"
      - text_visible: "Overall Progress"

  - click: "button:has-text('Activities')"
  - wait: 2000
  - screenshot: "topic-activities-tab"

  - click: "button:has-text('Insights Report')"
  - wait: 2000
  - screenshot: "topic-insights-tab"

  - click: "button:has-text('History')"
  - wait: 2000
  - screenshot: "topic-history-tab"
  - assert:
      - text_visible: "Research History Timeline"
      - text_visible: "researches total"
      - text_not_visible: "研究历史"

  - click: "button:has-text('Credibility')"
  - wait: 3000
  - screenshot: "topic-credibility-tab"
  - assert:
      - text_visible: "Credibility Report"
      - text_visible: "Authority"
      - text_visible: "Diversity"
      - text_visible: "Timeliness"
      - text_visible: "Coverage"
      - text_visible: "Source Assessment"
      - text_not_visible: "研究可信度报告"
      - text_not_visible: "权威性"
      - text_not_visible: "数据来源评估"

  - click: "button:has-text('References')"
  - wait: 2000
  - screenshot: "topic-references-tab"
  - assert:
      - text_visible: "sources"
      - text_visible: "High"
      - text_not_visible: "高可信"

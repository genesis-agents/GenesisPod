id: create-research-topic
tier: critical
auth: demo
steps:
  - navigate: /ai-research
  - wait: "h1, [data-testid='page-title']"
  - click: "button:has-text('Create'), button:has-text('New'), button[data-testid='create-topic']"
  - wait: "[role='dialog'], [data-testid='create-dialog']"
  - fill:
      "[name='title'], [data-testid='topic-title']": "[TEST-JOURNEY] Auto Created Topic"
  - click: "button[type='submit'], button:has-text('Create'), button:has-text('Submit')"
  - assert:
      url_contains: "/ai-research"
      text_not_contains: "Error"
  - cleanup:
      note: "Delete any [TEST-JOURNEY] prefixed topics after test"

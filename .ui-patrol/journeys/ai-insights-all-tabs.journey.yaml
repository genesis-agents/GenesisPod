# Journey: AI Insights Topic — All 7 Tabs Deep Verification
# Replaces the old research-topic-all-tabs.journey.yaml for /ai-insights route
id: ai-insights-all-tabs
tier: critical
auth: session
description: "Deep verification of all 7 tabs on Topic Insights detail page"

sampleTopicId: "8a5a6aeb-b2dd-4673-80cd-73687db4f96c"

steps:
  - navigate: /ai-insights/topic/{sampleTopicId}
  - wait: 3000
  - screenshot: "insights-page-loaded"

  # ═══════════════════════════════════════════════════════════════
  # Tab 1: 待办列表
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('待办列表'), button:has-text('Todo')"
  - wait: 2000
  - screenshot: "tab-todos"
  - assert:
      - element_visible: "[class*='todo'], [class*='task-list'], table, [role='list']"
        message: "Todo list should render"
      - text_not_contains: "[object Object]"
      - text_not_contains: "undefined"

  # ═══════════════════════════════════════════════════════════════
  # Tab 2: 协作动态
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('协作动态'), button:has-text('Collaboration')"
  - wait: 2000
  - screenshot: "tab-collaboration"
  - assert:
      - any_of:
          - element_visible: "[class*='timeline'], [class*='activity']"
          - text_visible_any: ["Agent", "Leader", "Researcher"]
        message: "Collaboration tab should show agent activities"

  # ═══════════════════════════════════════════════════════════════
  # Tab 3: 洞察报告
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('洞察报告'), button:has-text('Insights Report')"
  - wait: 3000
  - screenshot: "tab-report"
  - assert:
      - element_visible: "[class*='report'], [class*='markdown'], article"
        message: "Report content should render"
      - element_count_gte:
          selector: "h2, h3"
          min: 2
          message: "Report should have section headings"
      - text_not_contains: "<!-- chart:"
      - text_not_contains: "\\text{"
      - text_not_contains: "\\frac{"

  # Check both view modes
  - click: "button[aria-label='章节视图'], button:has(svg.lucide-book-open)"
  - wait: 2000
  - screenshot: "tab-report-chapter-view"
  - assert:
      - text_visible_any: ["章 1", "Chapter 1", "1."]
        message: "Chapter view should show chapter navigation"

  - click: "button[aria-label='连续视图'], button:has(svg.lucide-list)"
  - wait: 2000

  # ═══════════════════════════════════════════════════════════════
  # Tab 4: 研究历史
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('研究历史'), button:has-text('Research History')"
  - wait: 2000
  - screenshot: "tab-history"
  - assert:
      - any_of:
          - element_visible: "[class*='timeline'], [class*='history']"
          - text_visible_any: ["v1", "Version", "版本"]
        message: "History tab should show version history"

  # ═══════════════════════════════════════════════════════════════
  # Tab 5: 可信度
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('可信度'), button:has-text('Credibility')"
  - wait: 3000
  - screenshot: "tab-credibility"
  - assert:
      - any_of:
          - element_visible: "[class*='score'], [class*='credibility']"
          - text_visible_any:
              [
                "Authority",
                "Diversity",
                "Timeliness",
                "Coverage",
                "权威",
                "多样性",
              ]
        message: "Credibility tab should show scores"

  # ═══════════════════════════════════════════════════════════════
  # Tab 6: 参考文献
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('参考文献'), button:has-text('References')"
  - wait: 2000
  - screenshot: "tab-references"
  - assert:
      - element_count_gte:
          selector: "a[href*='http'], [class*='reference']"
          min: 1
          message: "References should show at least 1 source with link"
      - text_visible_any: ["sources", "来源", "High", "高"]

  # ═══════════════════════════════════════════════════════════════
  # Tab 7: 相关研究
  # ═══════════════════════════════════════════════════════════════
  - click: "button:has-text('相关研究'), button:has-text('Related')"
  - wait: 2000
  - screenshot: "tab-related"
  - assert:
      - text_not_contains: "[object Object]"
      - text_not_contains: "Error"

summary:
  pass_criteria:
    - "All 7 tabs load without errors"
    - "Report tab renders content in both view modes"
    - "No forbidden patterns in any tab"
    - "Credibility scores visible"
    - "References have clickable links"
    - "LaTeX formulas render (no raw commands)"

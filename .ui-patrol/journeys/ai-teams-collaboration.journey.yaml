# AI Teams Collaboration Journey
# Covers: TMS-001~008, E2E-003 from test plan
id: ai-teams-collaboration
tier: critical
auth: demo
description: >
  Tests full team collaboration workflow: view teams, enter team detail,
  verify team members, check discussion UI, verify voting mechanism presence.

steps:
  # Navigate to teams list
  - navigate: /ai-teams
  - wait: ".team-card, [data-testid='team-list'], .topic-card"
  - assert:
      element_visible: ".team-card, [data-testid='team-list'], .topic-card"
      text_not_contains:
        - "[object Object]"
        - "undefined"

  # Verify teams are listed (TMS-001)
  - assert:
      element_count_min:
        selector: ".team-card, .topic-card, [data-testid='team-item']"
        min: 1

  # Verify no console errors
  - assert:
      text_not_contains:
        - "Error"
        - "NaN"

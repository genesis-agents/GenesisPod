# Cross-Module Data Flow Journey
# Covers: INT-RES-LIB-001~003, INT-TMS-RES-001~002 from comprehensive-test-suite-2026-02-17.md
id: cross-module-data-flow
tier: important
auth: demo
description: >
  Tests cross-module data flows: Research -> Library -> Teams,
  Writing -> Library -> Ask. Verifies navigation and data accessibility.

steps:
  # Research -> Library chain
  - navigate: /ai-research
  - wait: "main, [data-testid='research-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Teams page
  - navigate: /ai-teams
  - wait: "main, [data-testid='teams-page'], .page-content, .topic-card"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Writing -> Library chain
  - navigate: /ai-writing
  - wait: "main, [data-testid='writing-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Library destination
  - navigate: /library
  - wait: "main, [data-testid='library-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Ask final destination
  - navigate: /ai-ask
  - wait: "textarea, [data-testid='chat-input']"
  - assert:
      element_visible: "textarea, [data-testid='chat-input']"

# AI Ask Mixture Mode Journey
# Covers: ASK-007, CMB-ASK-007, CMB-ASK-010 from test plan
id: ai-ask-mixture
tier: critical
auth: demo
description: >
  Tests Mixture mode: 4 models respond in parallel, each with independent
  responses. Verifies all model outputs render without errors.

steps:
  - navigate: /ai-ask
  - wait: "textarea, [data-testid='chat-input']"

  # Switch to Mixture mode
  - assert:
      element_visible: "textarea, [data-testid='chat-input']"

  # Verify Mixture mode UI elements
  - assert:
      text_not_contains: "[object Object]"
  - assert:
      text_not_contains: "undefined"
  - assert:
      text_not_contains: "Error"

  # In Mixture mode, verify multiple response areas can render
  # (actual model calling requires live API)

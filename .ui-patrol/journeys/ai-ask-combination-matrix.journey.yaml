# AI Ask Combination Matrix Journey
# Covers: CMB-ASK-001~010, CMB-FT-001~008 from test plan
id: ai-ask-combination-matrix
tier: critical
auth: demo
description: >
  Tests model x feature combinations: single model with all features enabled,
  Mixture mode, file type handling, and multi-feature combinations.

steps:
  # --- CMB-ASK-001: Grok full combo (web + knowledge + file + quote) ---
  - navigate: /ai-ask
  - wait: "textarea, [data-testid='chat-input']"
  - assert:
      element_visible: "textarea, [data-testid='chat-input']"

  # Verify model selector available
  - assert:
      element_visible: "[data-testid='model-selector'], .model-selector, button[aria-label*='model']"

  # Verify web search toggle available
  - assert:
      element_visible: "[data-testid='web-search-toggle'], .web-search-toggle, button[aria-label*='search']"

  # Verify knowledge base selector available
  - assert:
      element_visible: "[data-testid='knowledge-base-selector'], .knowledge-base-select"

  # Verify file upload available
  - assert:
      element_visible: "[data-testid='file-upload'], input[type='file'], button[aria-label*='upload']"

  # --- CMB-ASK-007: Mixture mode with all features ---
  # Verify Mixture mode toggle/tab exists
  - assert:
      element_visible: "[data-testid='mixture-mode'], .mixture-toggle, button[aria-label*='Mixture']"

  # Verify no errors on page
  - assert:
      text_not_contains: "[object Object]"
  - assert:
      text_not_contains: "undefined"
  - assert:
      text_not_contains: "NaN"
  - assert:
      text_not_contains: "Error"

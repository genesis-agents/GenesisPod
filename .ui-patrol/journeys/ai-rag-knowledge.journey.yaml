# AI RAG Knowledge Journey
# Covers: RAG-001~005 from comprehensive-test-plan-2026-02-06.md

name: RAG Knowledge Base Pipeline
description: "Test document upload, embedding, semantic search, URL fetch, and chunking"
auth: demo
test_plan_ids: [RAG-001, RAG-002, RAG-003, RAG-004, RAG-005]

steps:
  # RAG-001: Document upload + embedding
  - id: navigate-library
    action: navigate
    route: /library
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"

  - id: navigate-rag
    action: navigate
    route: /library/rag
    test_plan_ids: [RAG-001]
    assertions:
      - page_loaded: true
      - text_not_contains: "[object Object]"
    description: "RAG management page loads"

  - id: verify-upload-area
    action: snapshot
    test_plan_ids: [RAG-001]
    assertions:
      - text_not_contains: "Error"
    description: "Document upload area present and functional"

  # RAG-002: Semantic search
  - id: verify-search-ui
    action: snapshot
    test_plan_ids: [RAG-002]
    assertions:
      - text_not_contains: "[object Object]"
    description: "Search interface present for semantic queries"

  # RAG-003: URL fetch import
  - id: url-fetch-note
    action: note
    test_plan_ids: [RAG-003]
    description: "URL fetch verified via Explore → Library import journey (INT-ELA-001)"

  # RAG-004: WeChat import
  - id: wechat-import-note
    action: note
    test_plan_ids: [RAG-004]
    description: "WeChat article import - P2, verified via manual test or API integration"

  # RAG-005: Large document chunking
  - id: chunking-note
    action: note
    test_plan_ids: [RAG-005]
    description: "Document chunking verified via unit test on embedding service"

  # Knowledge graph view
  - id: navigate-knowledge-graph
    action: navigate
    route: /library/knowledge-graph
    assertions:
      - page_loaded: true
      - text_not_contains: "Error"
    description: "Knowledge graph visualization loads"

# AI Office Slides Journey
# Covers: OFC-SLD-001~005, OFC-THM-001~002, E2E-005 from comprehensive-test-suite-2026-02-17.md
id: ai-office-slides
tier: important
auth: demo
description: >
  Tests AI Office/Slides page: verify slides list loads,
  check PPT creation interface, verify team orchestration UI.

steps:
  # Navigate to office page
  - navigate: /ai-office
  - wait: "main, [data-testid='office-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Navigate to slides sub-page
  - navigate: /ai-office/slides
  - wait: "main, [data-testid='slides-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

# Journey: Admin monitoring and system health check
id: admin-monitoring-check
tier: critical
auth: session
description: "Navigate through admin monitoring, logs, and AI model pages to verify functionality"

steps:
  # 1. Admin Overview
  - navigate: /admin/overview
  - wait: 3000
  - screenshot: "admin-overview"

  # 2. System Monitoring
  - navigate: /admin/system/monitoring
  - wait: 3000
  - screenshot: "admin-monitoring"
  - assert:
      - text_not_contains: "Error"
      - text_not_contains: "[object Object]"

  # 3. System Logs
  - navigate: /admin/system/logs
  - wait: 3000
  - screenshot: "admin-logs"

  # 4. AI Models
  - navigate: /admin/ai/models
  - wait: 3000
  - screenshot: "admin-ai-models"

  # 5. AI Tools
  - navigate: /admin/ai/tools
  - wait: 3000
  - screenshot: "admin-ai-tools"

  # 6. User Management
  - navigate: /admin/access/users
  - wait: 3000
  - screenshot: "admin-users"

  # 7. Security
  - navigate: /admin/access/security
  - wait: 3000
  - screenshot: "admin-security"

  # 8. Site Configuration
  - navigate: /admin/system/site
  - wait: 3000
  - screenshot: "admin-site-config"

  # 9. Storage
  - navigate: /admin/storage
  - wait: 3000
  - screenshot: "admin-storage"

  # 10. Data Collection
  - navigate: /admin/data/collection
  - wait: 3000
  - screenshot: "admin-data-collection"

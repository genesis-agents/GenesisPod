# Explore -> Library -> Ask Integration Journey
# Covers: INT-ELA-001~003, E2E-DF-001 from test plan
id: explore-to-library-to-ask
tier: important
auth: demo
description: >
  Tests full cross-module data flow: Explore resources -> Library import ->
  Ask knowledge base query. Verifies data integrity across modules.

steps:
  # Step 1: Navigate to Explore
  - navigate: /explore
  - wait: "main, [data-testid='explore-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Step 2: Navigate to Library
  - navigate: /library
  - wait: "main, [data-testid='library-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

  # Step 3: Navigate to Ask with knowledge base
  - navigate: /ai-ask
  - wait: "textarea, [data-testid='chat-input']"
  - assert:
      element_visible: "textarea, [data-testid='chat-input']"
      text_not_contains:
        - "[object Object]"
        - "Error"

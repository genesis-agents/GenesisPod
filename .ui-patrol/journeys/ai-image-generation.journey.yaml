# AI Image Generation Journey
# Covers: IMG-GEN-001~006, IMG-STR-001~002, IMG-HIS-001~004 from comprehensive-test-suite-2026-02-17.md
id: ai-image-generation
tier: important
auth: demo
description: >
  Tests AI Image page: verify image gallery loads, creation UI accessible,
  brand kit section present, export options available.

steps:
  # Navigate to image page
  - navigate: /ai-image
  - wait: "main, [data-testid='image-page'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"
        - "NaN"

  # Navigate to image creation
  - navigate: /ai-image/create
  - wait: "main, [data-testid='image-create'], .page-content"
  - assert:
      text_not_contains:
        - "[object Object]"
        - "undefined"
        - "Error"

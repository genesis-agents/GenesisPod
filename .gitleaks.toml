# Genesis.ai gitleaks configuration.
# Extends the default ruleset and allowlists paths that only ever contain
# fake/placeholder credentials (unit-test fixtures, documentation examples,
# and locally-captured e2e auth state). Real source/config is still scanned.

title = "Genesis.ai gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures, doc examples, and local auth artifacts (placeholder secrets only)."
paths = [
  '''.*__tests__/.*''',
  '''.*\.spec\.(ts|js)$''',
  '''.*\.test\.(ts|js)$''',
  '''^docs/.*''',
  '''.*/docs/.*\.md$''',
  '''environment-variables\.md$''',
  '''^e2e/\.auth/.*''',
  '''^\.claude/.*''',
]

# Codecov configuration for coverage quality gates
# https://docs.codecov.io/docs/codecov-yaml
codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...95"

  status:
    # Overall project coverage must not decrease
    project:
      default:
        target: auto
        threshold: 1%  # Allow 1% decrease
        if_ci_failed: error

    # PR must not decrease coverage
    patch:
      default:
        target: 70%  # New code in PRs must have 70% coverage
        threshold: 5%

# Flag-specific thresholds
flags:
  backend:
    paths:
      - backend/src/
    carryforward: true
  frontend:
    paths:
      - frontend/
    carryforward: true

# Ignore test files and generated code from coverage metrics
ignore:
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "**/test/**"
  - "**/__tests__/**"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/prisma/generated/**"

# Comment configuration for PRs
comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

# DeepDive Engine - Docker Compose (PostgreSQL Only)
# 已迁移到统一 PostgreSQL 架构，移除了 Neo4j、MongoDB、Qdrant
# 知识图谱: PostgreSQL 递归 CTE (GraphService)
# 原始数据: PostgreSQL JSONB (RawDataService)

services:
  # PostgreSQL - 主数据库 (唯一数据库)
  postgres:
    image: postgres:16-alpine
    container_name: deepdive-postgres
    environment:
      POSTGRES_USER: deepdive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deepdive_dev_password}
      POSTGRES_DB: deepdive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepdive"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存 (可选，用于会话和缓存)
  redis:
    image: redis:7-alpine
    container_name: deepdive-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: deepdive-network

name: Deploy & Release

# Manual-only for now. The deploy job is still a placeholder and the release
# job auto-bumps the version + pushes to main, so we gate the whole workflow
# behind a manual trigger to avoid surprise release commits on every push.
# Re-enable push/tag triggers once real deployment is wired up.
on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Deploy to Railway (placeholder) ───────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Skip release commits to prevent loops
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v4

      # TODO: Replace with actual Railway deployment
      - name: Deploy placeholder
        run: |
          echo "Deployment placeholder"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

  # ── Auto Version Bump ─────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: deploy
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm install --legacy-peer-deps

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npx standard-version --skip.commit --skip.tag

      - name: Update lockfile
        run: npm install --legacy-peer-deps --package-lock-only

      - name: Commit and tag
        id: version
        run: |
          git add -A
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          git commit -m "chore(release): $VERSION"
          git tag "v$VERSION"

      - name: Push
        run: git push origin main && git push origin "v${{ steps.version.outputs.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

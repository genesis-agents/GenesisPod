# PR-9 v1.6 P-A12 / PR13-S5 — Agent-Playground e2e smoke (staging)
#
# 触发限制（security R2 N3 P0 修补）：
#   - 仅 push:main + workflow_dispatch；严禁 pull_request_target（防 fork PR 烧 OPENAI_API_KEY_TEST）
#   - 独立 concurrency group 防多 ref 并发烧 key
#   - OPENAI_API_KEY_TEST 必须在 OpenAI 平台侧绑 hard spend limit $5/月
#     见 https://platform.openai.com/account/limits
#
# 见 docs/architecture/ai-app/agent-playground/agent-playground-overhaul-v1.6.md § 12 P-A12

name: Playground E2E (Staging)

on:
  push:
    branches: [main]
    paths:
      - "backend/src/modules/ai-app/agent-playground/**"
      - "frontend/app/agent-playground/**"
      - "scripts/e2e-smoke/**"
      - ".github/workflows/playground-e2e.yml"
  workflow_dispatch:
    inputs:
      scale:
        description: "reportScale to test (quick/standard/deep)"
        required: false
        default: "deep"
        type: choice
        options: [quick, standard, deep]

# ★ 独立 concurrency group：防 main push + workflow_dispatch 并发烧 OPENAI_API_KEY_TEST
concurrency:
  group: playground-e2e-ai-key
  cancel-in-progress: false

jobs:
  playground-e2e:
    name: Playground Mission E2E (${{ github.event.inputs.scale || 'deep' }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # ★ 显式绑定（不依赖默认环境推断）
      OPENAI_API_KEY_TEST: ${{ secrets.OPENAI_API_KEY_TEST }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Playground Mission e2e smoke
        run: |
          chmod +x ./scripts/e2e-smoke/playground-mission.sh
          STAGING_BASE_URL="$STAGING_BASE_URL" \
          TEST_USER_API_KEY="$OPENAI_API_KEY_TEST" \
          SCALE="${{ github.event.inputs.scale || 'deep' }}" \
          TIMEOUT_SEC=900 \
          ./scripts/e2e-smoke/playground-mission.sh

name: Auto Release

# 每次 push main 自动升版本号
# 跳过 standard-version 自己生成的 "chore(release)" commit，避免死循环
on:
  push:
    branches: [main]

jobs:
  release:
    name: Auto Version Bump
    runs-on: ubuntu-latest
    # 跳过 release commit 防止循环
    if: >
      !contains(github.event.head_commit.message, 'chore(release)')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run standard-version
        run: npx standard-version --skip.commit --skip.tag

      - name: Update package-lock.json
        run: npm install --legacy-peer-deps --package-lock-only

      - name: Commit and tag release
        run: |
          git add -A
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore(release): $VERSION"
          git tag "v$VERSION"

      - name: Push version bump and tag
        run: git push origin main && git push origin "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

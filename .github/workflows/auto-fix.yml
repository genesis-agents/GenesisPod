# GitHub Actions workflow for automatic code fixes using Claude Code
#
# This workflow is triggered when:
# 1. A new issue is created with the 'auto-fix-candidate' label
# 2. The 'auto-fix-candidate' label is added to an existing issue
#
# It will:
# 1. Parse the issue body for fix instructions
# 2. Run Claude Code to generate a fix
# 3. Create a PR with the changes

name: Auto Fix with Claude Code

on:
  issues:
    types: [opened, labeled]

# Ensure only one auto-fix runs at a time
concurrency:
  group: auto-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # Only run if the issue has the auto-fix-candidate label
    if: contains(github.event.issue.labels.*.name, 'auto-fix-candidate')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Add processing label
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:in-progress']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 Starting auto-fix process...\n\nClaude Code is analyzing the issue and generating a fix.'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract fix instructions
        id: extract
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract the "Fix Instructions" section
            const fixMatch = body.match(/## Fix Instructions\n([\s\S]*?)(?=\n## |$)/);
            const instructions = fixMatch ? fixMatch[1].trim() : '';

            // Extract metadata JSON
            const metaMatch = body.match(/```json\n([\s\S]*?)\n```/);
            let metadata = {};
            if (metaMatch) {
              try {
                metadata = JSON.parse(metaMatch[1]);
              } catch (e) {
                console.log('Failed to parse metadata:', e);
              }
            }

            // Extract module from metadata or issue body
            const module = metadata.module || 'unknown';
            const complexity = metadata.complexity || 'unknown';
            const feedbackId = metadata.feedbackId || '';

            // Build the prompt for Claude Code
            const prompt = `
            You are fixing a bug reported by a user. Here are the details:

            Issue #${context.issue.number}: ${context.payload.issue.title}

            ${instructions}

            IMPORTANT:
            - Only make changes that directly fix the reported issue
            - Follow the existing code style and patterns
            - Add appropriate error handling
            - Test your changes mentally before committing
            - Focus on the ${module} module

            Start by understanding the codebase structure, then implement the fix.
            `;

            core.setOutput('prompt', prompt);
            core.setOutput('module', module);
            core.setOutput('complexity', complexity);
            core.setOutput('feedbackId', feedbackId);

            return { prompt, module, complexity, feedbackId };

      - name: Create fix branch
        id: branch
        run: |
          BRANCH_NAME="auto-fix/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Run Claude Code in non-interactive mode
          # Using --print to output the result and --dangerously-skip-permissions for automation
          claude-code --print --dangerously-skip-permissions \
            --prompt "${{ steps.extract.outputs.prompt }}" \
            2>&1 | tee claude-output.log

          # Check if any files were modified
          if git diff --quiet && git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.claude.outputs.no_changes != 'true'
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-code-bot@users.noreply.github.com"

          git add .
          git commit -m "fix: auto-fix for issue #${{ github.event.issue.number }}

          Module: ${{ steps.extract.outputs.module }}
          Feedback ID: ${{ steps.extract.outputs.feedbackId }}

          🤖 Generated with Claude Code
          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin ${{ steps.branch.outputs.branch_name }}

      - name: Create Pull Request
        if: steps.claude.outputs.no_changes != 'true'
        id: create-pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto-Fix] Fixes #${context.issue.number}`,
              head: '${{ steps.branch.outputs.branch_name }}',
              base: 'main',
              body: `## Auto-generated Fix

            This PR was automatically generated by Claude Code to fix issue #${context.issue.number}.

            ### Related Issue
            Closes #${context.issue.number}

            ### Module
            \`${{ steps.extract.outputs.module }}\`

            ### Complexity
            ${{ steps.extract.outputs.complexity }}

            ### Review Notes
            - Please review the changes carefully before merging
            - Run tests to verify the fix works correctly
            - Check for any unintended side effects

            ---
            🤖 Generated with [Claude Code](https://claude.com/claude-code)

            Co-Authored-By: Claude <noreply@anthropic.com>`
            });

            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-fix', 'needs-review']
            });

            // Comment on the original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 Auto-fix PR created: #${pr.number}\n\nPlease review the changes and merge if they look correct.`
            });

            // Update issue labels
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status:in-progress'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:pr-created']
            });

            return pr.number;

      - name: Handle no changes
        if: steps.claude.outputs.no_changes == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ Claude Code analyzed the issue but did not make any changes.

            This could mean:
            - The issue requires more context or information
            - The fix is too complex for automatic resolution
            - The issue may already be fixed

            Please review manually or provide more details.`
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status:in-progress'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-manual-review']
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Auto-fix failed. Please check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.

            The issue has been marked for manual review.`
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'status:in-progress'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:failed', 'needs-manual-review']
            });

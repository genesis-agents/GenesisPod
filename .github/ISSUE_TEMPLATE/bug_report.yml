name: Bug report
description: Report a reproducible problem
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** report security issues here —
        see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ... I expected ... but got ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend (Next.js)
        - Backend (NestJS)
        - AI service (FastAPI)
        - Agent runtime / Playground
        - Deployment / Docker
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, deployment method, relevant model providers.
      placeholder: "macOS 14, Node 20.11, docker compose, OpenAI"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs. **Redact all secrets and API keys.**
      render: shell

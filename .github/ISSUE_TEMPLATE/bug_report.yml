name: Bug report
description: Report a problem so we can fix it
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        detail as you can — it makes the issue much faster to resolve.

        Do **not** include secrets (API keys, tokens, passwords) in this report.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages and logs if available.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - frontend
        - backend
        - ai-service
        - infra / deployment
        - docs
        - not sure
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, browser, deployment (local / Docker / hosted), commit or version.
      placeholder: |
        - OS: macOS 14.5
        - Node: 20.11.0
        - Commit/version: 50.6.1
    validations:
      required: false

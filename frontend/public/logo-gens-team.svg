<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gt_core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gt_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="gt_conn1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gt_conn2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gt_conn3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Core glow filter -->
    <filter id="gt_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Node glow -->
    <filter id="gt_nglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagonal frame -->
  <polygon points="32,3 55,15 55,41 32,53 9,41 9,15"
    stroke="url(#gt_ring)" stroke-width="1.8" fill="none" opacity="0.8"/>

  <!-- Inner hex -->
  <polygon points="32,11 47,19 47,35 32,43 17,35 17,19"
    stroke="url(#gt_ring)" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- Connection lines (thicker, more visible) -->
  <line x1="32" y1="3" x2="9" y2="41" stroke="url(#gt_conn1)" stroke-width="1"/>
  <line x1="32" y1="3" x2="55" y2="41" stroke="url(#gt_conn2)" stroke-width="1"/>
  <line x1="9" y1="15" x2="55" y2="41" stroke="url(#gt_conn1)" stroke-width="1"/>
  <line x1="55" y1="15" x2="9" y2="41" stroke="url(#gt_conn2)" stroke-width="1"/>
  <line x1="9" y1="15" x2="55" y2="15" stroke="url(#gt_conn3)" stroke-width="0.8"/>
  <line x1="9" y1="41" x2="55" y2="41" stroke="url(#gt_conn3)" stroke-width="0.8"/>

  <!-- Core: glowing central sphere -->
  <circle cx="32" cy="28" r="14" fill="#6366F1" opacity="0.12"/>
  <circle cx="32" cy="28" r="10" fill="url(#gt_core)" filter="url(#gt_glow)"/>
  <circle cx="29.5" cy="25" r="3" fill="white" opacity="0.2"/>

  <!-- "G" letter -->
  <text x="32" y="33" text-anchor="middle" fill="white" font-size="14"
    font-weight="900" font-family="Inter,system-ui,sans-serif"
    filter="url(#gt_glow)">G</text>

  <!-- Agent nodes — larger, glowing -->
  <!-- Top: cyan (Research) -->
  <circle cx="32" cy="3" r="5" fill="#06B6D4" opacity="0.2"/>
  <circle cx="32" cy="3" r="3.5" fill="#06B6D4" filter="url(#gt_nglow)"/>
  <circle cx="31" cy="2" r="1.2" fill="white" opacity="0.6"/>

  <!-- Top-right: violet (Analysis) -->
  <circle cx="55" cy="15" r="5" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="55" cy="15" r="3.5" fill="#8B5CF6" filter="url(#gt_nglow)"/>
  <circle cx="54" cy="14" r="1.2" fill="white" opacity="0.6"/>

  <!-- Bottom-right: pink (Writing) -->
  <circle cx="55" cy="41" r="5" fill="#EC4899" opacity="0.2"/>
  <circle cx="55" cy="41" r="3.5" fill="#EC4899" filter="url(#gt_nglow)"/>
  <circle cx="54" cy="40" r="1.2" fill="white" opacity="0.6"/>

  <!-- Bottom: gold (Review) -->
  <circle cx="32" cy="53" r="5" fill="#FBBF24" opacity="0.2"/>
  <circle cx="32" cy="53" r="3.5" fill="#FBBF24" filter="url(#gt_nglow)"/>
  <circle cx="31" cy="52" r="1.2" fill="white" opacity="0.6"/>

  <!-- Bottom-left: green (Data) -->
  <circle cx="9" cy="41" r="5" fill="#10B981" opacity="0.2"/>
  <circle cx="9" cy="41" r="3.5" fill="#10B981" filter="url(#gt_nglow)"/>
  <circle cx="8" cy="40" r="1.2" fill="white" opacity="0.6"/>

  <!-- Top-left: orange (Planning) -->
  <circle cx="9" cy="15" r="5" fill="#F97316" opacity="0.2"/>
  <circle cx="9" cy="15" r="3.5" fill="#F97316" filter="url(#gt_nglow)"/>
  <circle cx="8" cy="14" r="1.2" fill="white" opacity="0.6"/>

  <!-- Sparkle particles — brighter -->
  <circle cx="20" cy="8" r="1.2" fill="#67E8F9" opacity="0.9"/>
  <circle cx="44" cy="8" r="1" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="5" cy="28" r="1.2" fill="#34D399" opacity="0.9"/>
  <circle cx="59" cy="28" r="1" fill="#F9A8D4" opacity="0.9"/>
  <circle cx="20" cy="48" r="1" fill="#FDE68A" opacity="0.9"/>
  <circle cx="44" cy="48" r="1.2" fill="#FB923C" opacity="0.9"/>
  <!-- Extra center sparkles -->
  <circle cx="22" cy="22" r="0.7" fill="#67E8F9" opacity="0.6"/>
  <circle cx="42" cy="34" r="0.7" fill="#F9A8D4" opacity="0.6"/>
</svg>

<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Genesis.ai Logo: Line-art tech squirrel with circuit-trace tail -->
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Tail — three flowing circuit traces curving up-left -->
  <path d="M13 24 Q7 22 5.5 17 Q4 12 6.5 8.5 Q8.5 5.5 11.5 5" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M13 24 Q8.5 20 8 15.5 Q7.5 11 10 8" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M13 24 Q10.5 19.5 11 15.5 Q11.5 12 14 10" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Circuit nodes — colorful sparkle dots at trace endpoints -->
  <circle cx="11.5" cy="5" r="1.2" fill="#06B6D4"/>
  <circle cx="6.5" cy="8.5" r="1.2" fill="#8B5CF6"/>
  <circle cx="5.5" cy="17" r="1.2" fill="#EC4899"/>
  <circle cx="10" cy="8" r="1" fill="#A78BFA"/>
  <circle cx="8" cy="15.5" r="1" fill="#6366F1"/>
  <circle cx="14" cy="10" r="1" fill="#06B6D4"/>
  <circle cx="11" cy="15.5" r="1" fill="#EC4899"/>
  <!-- Sparkle halos on primary nodes -->
  <circle cx="11.5" cy="5" r="2.4" fill="#06B6D4" opacity="0.12"/>
  <circle cx="6.5" cy="8.5" r="2.4" fill="#8B5CF6" opacity="0.12"/>
  <circle cx="5.5" cy="17" r="2.4" fill="#EC4899" opacity="0.12"/>
  <!-- Body — simple oval outline -->
  <ellipse cx="16" cy="23" rx="4" ry="4.8" stroke="#1E293B" stroke-width="1.2" fill="none"/>
  <!-- Head — oval outline -->
  <ellipse cx="20.5" cy="16" rx="3.8" ry="4" stroke="#1E293B" stroke-width="1.2" fill="none"/>
  <!-- Ear -->
  <path d="M22 12.5 L23.5 9.5 L21 11.5" stroke="#1E293B" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Eye -->
  <circle cx="22" cy="15" r="0.8" fill="#1E293B"/>
  <!-- Nose -->
  <circle cx="24" cy="17" r="0.5" fill="#1E293B"/>
  <!-- Front paw + acorn -->
  <path d="M21.5 19.5 Q23 20.5 23.5 22" stroke="#1E293B" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <circle cx="24" cy="22.5" r="1" stroke="#1E293B" stroke-width="0.8" fill="none"/>
  <path d="M23.5 21.5 L24 21 L24.5 21.5" stroke="#1E293B" stroke-width="0.6" stroke-linecap="round" fill="none"/>
</svg>

<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Genesis Logo · v2 (Business Monogram)
    深墨蓝 #0B1E3F badge + 暖金 #C9A961 双线描边 + 衬线 G monogram。
    无动画。设计基准 64×64，缩放至 16/24/32/48/96 仍清晰。
  -->
  <defs>
    <radialGradient id="genesisLogoBg" cx="32%" cy="22%" r="95%">
      <stop offset="0%"   stop-color="#1B3461"/>
      <stop offset="55%"  stop-color="#0B1E3F"/>
      <stop offset="100%" stop-color="#050E22"/>
    </radialGradient>
    <linearGradient id="genesisLogoGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8CE93"/>
      <stop offset="48%"  stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#9C7E3D"/>
    </linearGradient>
  </defs>

  <!-- Badge: deep navy rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="13" ry="13"
        fill="url(#genesisLogoBg)"/>

  <!-- 主金线（外框） -->
  <rect x="2" y="2" width="60" height="60" rx="13" ry="13"
        fill="none" stroke="url(#genesisLogoGold)" stroke-width="1.25"/>

  <!-- 内细金线（双框，珠宝/银行式精致感） -->
  <rect x="5.5" y="5.5" width="53" height="53" rx="9.75" ry="9.75"
        fill="none" stroke="#C9A961" stroke-width="0.5" opacity="0.4"/>

  <!-- G monogram
       圆心 (32,32)，半径 16；从右上 30° 起笔，沿左侧绕到右下 30° 收笔，
       向内收一道终止横笔到圆心（衬线 G 的标志特征）。 -->
  <path d="M 45.86 24 A 16 16 0 1 0 45.86 40 L 45.86 32 L 33 32"
        stroke="url(#genesisLogoGold)"
        stroke-width="4.5"
        stroke-linecap="butt"
        stroke-linejoin="round"
        fill="none"/>
</svg>

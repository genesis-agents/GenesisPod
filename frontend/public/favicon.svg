<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Genesis.ai Logo: Tech Squirrel with circuit-trace tail -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="tailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Tail (circuit traces) -->
  <path d="M10 22 Q6 20 5 16 Q4 11 7 8 Q9 5.5 12 6" stroke="url(#tailGrad)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M10 22 Q7 18 7.5 14 Q8 10 11 8.5" stroke="url(#tailGrad)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M10 22 Q9 17 10 14 Q11 11 13.5 10" stroke="url(#tailGrad)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Circuit nodes on tail -->
  <circle cx="12" cy="6" r="1.3" fill="#06B6D4"/>
  <circle cx="7" cy="8" r="1.3" fill="#8B5CF6"/>
  <circle cx="5" cy="16" r="1.3" fill="#EC4899"/>
  <circle cx="7.5" cy="14" r="1.1" fill="#A78BFA"/>
  <circle cx="11" cy="8.5" r="1.1" fill="#6366F1"/>
  <circle cx="10" cy="14" r="1.1" fill="#06B6D4"/>
  <circle cx="13.5" cy="10" r="1.1" fill="#EC4899"/>
  <!-- Body -->
  <ellipse cx="15" cy="22" rx="4.5" ry="5" fill="url(#bodyGrad)"/>
  <!-- Head -->
  <ellipse cx="19" cy="14.5" rx="4" ry="4.5" fill="url(#bodyGrad)"/>
  <!-- Ear -->
  <path d="M21 10.5 L22.5 7.5 L20 9.5" fill="#8B5CF6"/>
  <!-- Eye -->
  <circle cx="20.5" cy="13.5" r="1" fill="white"/>
  <circle cx="20.8" cy="13.5" r="0.5" fill="#1E1B4B"/>
  <!-- Nose -->
  <circle cx="22.5" cy="15.5" r="0.6" fill="#C4B5FD"/>
  <!-- Front paw holding acorn -->
  <path d="M20 18 Q22 19 22.5 20.5" stroke="url(#bodyGrad)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <circle cx="23" cy="21" r="1.2" fill="#F59E0B"/>
  <!-- Sparkle effects on circuit nodes -->
  <circle cx="12" cy="6" r="2.5" fill="#06B6D4" opacity="0.2"/>
  <circle cx="7" cy="8" r="2.5" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="5" cy="16" r="2.5" fill="#EC4899" opacity="0.2"/>
</svg>

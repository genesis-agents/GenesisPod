<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b_core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="b_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Orbital ring -->
  <ellipse cx="32" cy="32" rx="22" ry="22" stroke="url(#b_ring)" stroke-width="1.5" fill="none"/>
  <!-- Inner ring -->
  <ellipse cx="32" cy="32" rx="13" ry="13" stroke="url(#b_ring)" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Core glow -->
  <circle cx="32" cy="32" r="12" fill="#6366F1" opacity="0.08"/>
  <circle cx="32" cy="32" r="7" fill="url(#b_core)"/>
  <circle cx="30" cy="30" r="2.5" fill="white" opacity="0.3"/>
  <!-- AI letter in center -->
  <text x="32" y="36" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">AI</text>
  <!-- Orbiting agents -->
  <circle cx="32" cy="10" r="5" fill="#06B6D4" opacity="0.15"/>
  <circle cx="32" cy="10" r="3.2" fill="#06B6D4"/>
  <circle cx="30.8" cy="8.8" r="1" fill="white" opacity="0.5"/>
  <circle cx="13" cy="43" r="5" fill="#EC4899" opacity="0.15"/>
  <circle cx="13" cy="43" r="3.2" fill="#EC4899"/>
  <circle cx="11.8" cy="41.8" r="1" fill="white" opacity="0.5"/>
  <circle cx="51" cy="43" r="5" fill="#FBBF24" opacity="0.15"/>
  <circle cx="51" cy="43" r="3.2" fill="#FBBF24"/>
  <circle cx="49.8" cy="41.8" r="1" fill="white" opacity="0.5"/>
  <!-- Sparkle particles -->
  <circle cx="22" cy="14" r="1" fill="#67E8F9" opacity="0.8"/>
  <circle cx="42" cy="14" r="1" fill="#A78BFA" opacity="0.8"/>
  <circle cx="10" cy="32" r="1" fill="#F9A8D4" opacity="0.8"/>
  <circle cx="54" cy="32" r="1" fill="#FDE68A" opacity="0.8"/>
</svg>
